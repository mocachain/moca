version: "2"
run:
  tests: true
output:
  formats:
    tab:
      path: stdout
      colors: false
linters:
  enable:
    - asciicheck
    - dogsled
    - goconst
    - gocritic
    - gomodguard_v2
    - gosec
    - lll
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
  settings:
    dogsled:
      max-blank-identifiers: 3
    gomodguard:
      blocked:
        versions:
          - https://github.com/etcd-io/etcd:
              version: '>= 3.4.10 || ~3.3.23'
              reason: CVE-2020-15114; CVE-2020-15136; CVE-2020-15115
          - https://github.com/dgrijalva/jwt-go:
              version: '>= 4.0.0-preview1'
              reason: CVE-2020-26160
    lll:
      line-length: 400
    misspell:
      locale: US
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - x/storage/
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - x/storage/
      - third_party$
      - builtin$
      - examples$
