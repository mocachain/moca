  /cosmos/base/node/v1beta1/status:
    get:
      summary: Status queries for the node status.
      operationId: NodeStatus
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              earliest_store_height:
                type: string
                format: uint64
              height:
                type: string
                format: uint64
              timestamp:
                type: string
                format: date-time
              app_hash:
                type: string
                format: byte
              validator_hash:
                type: string
                format: byte
            description: >-
              StateResponse defines the response structure for the status of a
              node.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Service
definitions:
  cosmos.evm.vm.v1.AccessControl:
    type: object
    properties:
      create:
        title: create defines the permission policy for creating contracts
        type: object
        properties:
          access_type:
            title: >-
              access_type defines which type of permission is required for the
              operation
            type: string
            enum:
              - ACCESS_TYPE_PERMISSIONLESS
              - ACCESS_TYPE_RESTRICTED
              - ACCESS_TYPE_PERMISSIONED
            default: ACCESS_TYPE_PERMISSIONLESS
            description: >-
              - ACCESS_TYPE_PERMISSIONLESS: ACCESS_TYPE_PERMISSIONLESS does not
              restrict the operation to anyone
               - ACCESS_TYPE_RESTRICTED: ACCESS_TYPE_RESTRICTED restrict the operation to anyone
               - ACCESS_TYPE_PERMISSIONED: ACCESS_TYPE_PERMISSIONED only allows the operation for specific addresses
          access_control_list:
            type: array
            items:
              type: string
            title: >-
              access_control_list defines defines different things depending on
              the

              AccessType:

              - ACCESS_TYPE_PERMISSIONLESS: list of addresses that are blocked
              from

              performing the operation

              - ACCESS_TYPE_RESTRICTED: ignored

              - ACCESS_TYPE_PERMISSIONED: list of addresses that are allowed to
              perform

              the operation
      call:
        title: call defines the permission policy for calling contracts
        type: object
        properties:
          access_type:
            title: >-
              access_type defines which type of permission is required for the
              operation
            type: string
            enum:
              - ACCESS_TYPE_PERMISSIONLESS
              - ACCESS_TYPE_RESTRICTED
              - ACCESS_TYPE_PERMISSIONED
            default: ACCESS_TYPE_PERMISSIONLESS
            description: >-
              - ACCESS_TYPE_PERMISSIONLESS: ACCESS_TYPE_PERMISSIONLESS does not
              restrict the operation to anyone
               - ACCESS_TYPE_RESTRICTED: ACCESS_TYPE_RESTRICTED restrict the operation to anyone
               - ACCESS_TYPE_PERMISSIONED: ACCESS_TYPE_PERMISSIONED only allows the operation for specific addresses
          access_control_list:
            type: array
            items:
              type: string
            title: >-
              access_control_list defines defines different things depending on
              the

              AccessType:

              - ACCESS_TYPE_PERMISSIONLESS: list of addresses that are blocked
              from

              performing the operation

              - ACCESS_TYPE_RESTRICTED: ignored

              - ACCESS_TYPE_PERMISSIONED: list of addresses that are allowed to
              perform

              the operation
    title: |-
      AccessControl defines the permission policy of the EVM
      for creating and calling contracts
  cosmos.evm.vm.v1.AccessControlType:
    type: object
    properties:
      access_type:
        title: >-
          access_type defines which type of permission is required for the
          operation
        type: string
        enum:
          - ACCESS_TYPE_PERMISSIONLESS
          - ACCESS_TYPE_RESTRICTED
          - ACCESS_TYPE_PERMISSIONED
        default: ACCESS_TYPE_PERMISSIONLESS
        description: >-
          - ACCESS_TYPE_PERMISSIONLESS: ACCESS_TYPE_PERMISSIONLESS does not
          restrict the operation to anyone
           - ACCESS_TYPE_RESTRICTED: ACCESS_TYPE_RESTRICTED restrict the operation to anyone
           - ACCESS_TYPE_PERMISSIONED: ACCESS_TYPE_PERMISSIONED only allows the operation for specific addresses
      access_control_list:
        type: array
        items:
          type: string
        title: >-
          access_control_list defines defines different things depending on the

          AccessType:

          - ACCESS_TYPE_PERMISSIONLESS: list of addresses that are blocked from

          performing the operation

          - ACCESS_TYPE_RESTRICTED: ignored

          - ACCESS_TYPE_PERMISSIONED: list of addresses that are allowed to
