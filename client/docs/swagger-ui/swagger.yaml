        format: uint64
        title: gas_used specifies how much gas was consumed by the transaction
      max_used_gas:
        type: string
        format: uint64
        title: >-
          max_used_gas specifies the gas consumed by the transaction, not
          including refunds
      block_hash:
        type: string
        format: byte
        title: include the block hash for json-rpc to use
      block_timestamp:
        type: string
        format: uint64
        title: include the block timestamp for json-rpc to use
    description: MsgEthereumTxResponse defines the Msg/EthereumTx response type.
