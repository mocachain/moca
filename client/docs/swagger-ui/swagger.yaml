                    default: REDUNDANCY_EC_TYPE
                  source_type:
                    description: source_type define the source of the object.
                    type: string
                    enum:
                      - SOURCE_TYPE_ORIGIN
                      - SOURCE_TYPE_MIRROR_PENDING
