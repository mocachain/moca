                          type: string
                          format: byte
                      title: >-
                        PublicKey defines the keys available for use with
                        Validators
                    power:
                      type: string
                      format: int64
                description: >-
                  validator_updates contains the validator updates for this
                  block.
              consensus_param_updates:
                description: >-
                  consensus_param_updates contains any consensus parameter
                  updates for this block.
                type: object
                properties:
                  block:
                    type: object
                    properties:
                      max_bytes:
                        type: string
                        format: int64
                        title: |-
                          Max block size, in bytes.
                          Note: must be greater than 0
                      max_gas:
                        type: string
                        format: int64
                        title: |-
                          Max gas per block.
                          Note: must be greater or equal to -1
                    description: BlockParams contains limits on the block size.
                  evidence:
                    type: object
                    properties:
                      max_age_num_blocks:
                        type: string
                        format: int64
                        description: >-
                          Max age of evidence, in blocks.


                          The basic formula for calculating this is:
                          MaxAgeDuration / {average block

                          time}.
