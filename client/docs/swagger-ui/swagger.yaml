swagger: '2.0'
info:
  title: Moca Chain - gRPC Gateway docs
  description: A REST interface for state queries and transactions
  version: 1.0.0
paths:
  /cosmos/evm/vm/v1/account/{address}:
    get:
      summary: Account queries an Ethereum account.
      operationId: EvmAccount
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              balance:
                type: string
                description: balance is the balance of the EVM denomination.
              code_hash:
                type: string
                description: code_hash is the hex-formatted code bytes from the EOA.
              nonce:
                type: string
                format: uint64
                description: nonce is the account's sequence number.
            description: >-
              QueryAccountResponse is the response type for the Query/Account
              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: address
          description: address is the ethereum hex address to query the account for.
          in: path
          required: true
          type: string
      tags:
        - Query
  /cosmos/evm/vm/v1/balances/{address}:
    get:
      summary: |-
        Balance queries the balance of a the EVM denomination for a single
        account.
      operationId: EvmBalance
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              balance:
                type: string
                description: balance is the balance of the EVM denomination.
            description: >-
              QueryBalanceResponse is the response type for the Query/Balance
              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: address
          description: address is the ethereum hex address to query the balance for.
          in: path
          required: true
          type: string
      tags:
        - Query
  /cosmos/evm/vm/v1/base_fee:
    get:
      summary: >-
        BaseFee queries the base fee of the parent block of the current block,

        it's similar to feemarket module's method, but also checks london
        hardfork

        status.
      operationId: EvmBaseFee
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              base_fee:
                type: string
                title: base_fee is the EIP1559 base fee
            description: QueryBaseFeeResponse returns the EIP1559 base fee.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/codes/{address}:
    get:
      summary: Code queries the balance of all coins for a single account.
      operationId: EvmCode
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              code:
                type: string
                format: byte
                description: code represents the code bytes from an ethereum address.
            description: |-
              QueryCodeResponse is the response type for the Query/Code RPC
              method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: address
          description: address is the ethereum hex address to query the code for.
          in: path
          required: true
          type: string
      tags:
        - Query
  /cosmos/evm/vm/v1/config:
    get:
      summary: Config queries the EVM configuration
      operationId: EvmConfig
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              config:
                title: config is the evm configuration
                type: object
                properties:
                  homestead_block:
                    type: string
                    title: >-
                      homestead_block switch (nil no fork, 0 = already
                      homestead)
                  dao_fork_block:
                    type: string
                    title: >-
                      dao_fork_block corresponds to TheDAO hard-fork switch
                      block (nil no fork)
                  dao_fork_support:
                    type: boolean
                    title: >-
                      dao_fork_support defines whether the nodes supports or
                      opposes the DAO

                      hard-fork
                  eip150_block:
                    type: string
                    title: >-
                      eip150_block: EIP150 implements the Gas price changes

                      (https://github.com/ethereum/EIPs/issues/150) EIP150 HF
                      block (nil no fork)
                  eip155_block:
                    type: string
                    title: 'eip155_block: EIP155Block HF block'
                  eip158_block:
                    type: string
                    title: 'eip158_block: EIP158 HF block'
                  byzantium_block:
                    type: string
                    title: >-
                      byzantium_block: Byzantium switch block (nil no fork, 0 =
                      already on

                      byzantium)
                  constantinople_block:
                    type: string
                    title: >-
                      constantinople_block: Constantinople switch block (nil no
                      fork, 0 = already

                      activated)
                  petersburg_block:
                    type: string
                    title: >-
                      petersburg_block: Petersburg switch block (nil same as
                      Constantinople)
                  istanbul_block:
                    type: string
                    title: >-
                      istanbul_block: Istanbul switch block (nil no fork, 0 =
                      already on

                      istanbul)
                  muir_glacier_block:
                    type: string
                    title: >-
                      muir_glacier_block: Eip-2384 (bomb delay) switch block
                      (nil no fork, 0 =

                      already activated)
                  berlin_block:
                    type: string
                    title: >-
                      berlin_block: Berlin switch block (nil = no fork, 0 =
                      already on berlin)
                  london_block:
                    type: string
                    title: >-
                      london_block: London switch block (nil = no fork, 0 =
                      already on london)
                  arrow_glacier_block:
                    type: string
                    title: >-
                      arrow_glacier_block: Eip-4345 (bomb delay) switch block
                      (nil = no fork, 0 =

                      already activated)
                  gray_glacier_block:
                    type: string
                    title: >-
                      gray_glacier_block: EIP-5133 (bomb delay) switch block
                      (nil = no fork, 0 =

                      already activated)
                  merge_netsplit_block:
                    type: string
                    title: >-
                      merge_netsplit_block: Virtual fork after The Merge to use
                      as a network

                      splitter
                  chain_id:
                    type: string
                    format: uint64
                    title: chain_id is the id of the chain (EIP-155)
                  denom:
                    type: string
                    title: denom is the denomination used on the EVM
                  decimals:
                    type: string
                    format: uint64
                    title: >-
                      decimals is the real decimal precision of the denomination
                      used on the EVM
                  shanghai_time:
                    type: string
                    title: >-
                      shanghai_time: Shanghai switch time (nil = no fork, 0 =
                      already on

                      shanghai)
                  cancun_time:
                    type: string
                    title: >-
                      cancun_time: Cancun switch time (nil = no fork, 0 =
                      already on cancun)
                  prague_time:
                    type: string
                    title: >-
                      prague_time: Prague switch time (nil = no fork, 0 =
                      already on prague)
                  verkle_time:
                    type: string
                    title: >-
                      verkle_time: Verkle switch time (nil = no fork, 0 =
                      already on verkle)
                  osaka_time:
                    type: string
                    title: >-
                      osaka_time: Osaka switch time (nil = no fork, 0 = already
                      on osaka)
                description: >-
                  ChainConfig defines the Ethereum ChainConfig parameters using
                  *sdk.Int values

                  instead of *big.Int.
            description: QueryConfigResponse returns the EVM config.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/cosmos_account/{address}:
    get:
      summary: CosmosAccount queries an Ethereum account's Cosmos Address.
      operationId: CosmosAccount
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              cosmos_address:
                type: string
                description: cosmos_address is the cosmos address of the account.
              sequence:
                type: string
                format: uint64
                description: sequence is the account's sequence number.
              account_number:
                type: string
                format: uint64
                title: account_number is the account number
            description: >-
              QueryCosmosAccountResponse is the response type for the
              Query/CosmosAccount

              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: address
          description: address is the ethereum hex address to query the account for.
          in: path
          required: true
          type: string
      tags:
        - Query
  /cosmos/evm/vm/v1/estimate_gas:
    get:
      summary: EstimateGas implements the `eth_estimateGas` rpc api
      operationId: EstimateGas
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              gas:
                type: string
                format: uint64
                title: gas returns the estimated gas
              ret:
                type: string
                format: byte
                title: >-
                  ret is the returned data from evm function (result or data
                  supplied with

                  revert opcode)
              vm_error:
                type: string
                title: vm_error is the error returned by vm execution
            title: EstimateGasResponse defines EstimateGas response
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: args
          description: args uses the same json format as the json rpc api.
          in: query
          required: false
          type: string
          format: byte
        - name: gas_cap
          description: gas_cap defines the default gas cap to be used.
          in: query
          required: false
          type: string
          format: uint64
        - name: proposer_address
          description: proposer_address of the requested block in hex format.
          in: query
          required: false
          type: string
          format: byte
        - name: chain_id
          description: >-
            chain_id is the eip155 chain id parsed from the requested block
            header.
          in: query
          required: false
          type: string
          format: int64
        - name: overrides
          description: state overrides encoded as json.
          in: query
          required: false
          type: string
          format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/eth_call:
    get:
      summary: EthCall implements the `eth_call` rpc api
      operationId: EthCall
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              hash:
                type: string
                title: >-
                  hash of the ethereum transaction in hex format. This hash
                  differs from the

                  CometBFT sha256 hash of the transaction bytes. See

                  https://github.com/tendermint/tendermint/issues/6539 for
                  reference
              logs:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                      title: address of the contract that generated the event
                    topics:
                      type: array
                      items:
                        type: string
                      description: topics is a list of topics provided by the contract.
                    data:
                      type: string
                      format: byte
                      title: >-
                        data which is supplied by the contract, usually
                        ABI-encoded
                    block_number:
                      type: string
                      format: uint64
                      title: >-
                        block_number of the block in which the transaction was
                        included
                    tx_hash:
                      type: string
                      title: tx_hash is the transaction hash
                    tx_index:
                      type: string
                      format: uint64
                      title: tx_index of the transaction in the block
                    block_hash:
                      type: string
                      title: >-
                        block_hash of the block in which the transaction was
                        included
                    index:
                      type: string
                      format: uint64
                      title: index of the log in the block
                    removed:
                      type: boolean
                      description: >-
                        removed is true if this log was reverted due to a chain

                        reorganisation. You must pay attention to this field if
                        you receive logs

                        through a filter query.
                    block_timestamp:
                      type: string
                      format: uint64
                      title: >-
                        block_timestamp is the timestamp of the block in which
                        the transaction was
                  description: >-
                    Log represents an protobuf compatible Ethereum Log that
                    defines a contract

                    log event. These events are generated by the LOG opcode and
                    stored/indexed by

                    the node.


                    NOTE: address, topics and data are consensus fields. The
                    rest of the fields

                    are derived, i.e. filled in by the nodes, but not secured by
                    consensus.
                description: >-
                  logs contains the transaction hash and the proto-compatible
                  ethereum

                  logs.
              ret:
                type: string
                format: byte
                title: >-
                  ret is the returned data from evm function (result or data
                  supplied with

                  revert opcode)
              vm_error:
                type: string
                title: vm_error is the error returned by vm execution
              gas_used:
                type: string
                format: uint64
                title: >-
                  gas_used specifies how much gas was consumed by the
                  transaction
              max_used_gas:
                type: string
                format: uint64
                title: >-
                  max_used_gas specifies the gas consumed by the transaction,
                  not including refunds
              block_hash:
                type: string
                format: byte
                title: include the block hash for json-rpc to use
              block_timestamp:
                type: string
                format: uint64
                title: include the block timestamp for json-rpc to use
            description: MsgEthereumTxResponse defines the Msg/EthereumTx response type.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: args
          description: args uses the same json format as the json rpc api.
          in: query
          required: false
          type: string
          format: byte
        - name: gas_cap
          description: gas_cap defines the default gas cap to be used.
          in: query
          required: false
          type: string
          format: uint64
        - name: proposer_address
          description: proposer_address of the requested block in hex format.
          in: query
          required: false
          type: string
          format: byte
        - name: chain_id
          description: >-
            chain_id is the eip155 chain id parsed from the requested block
            header.
          in: query
          required: false
          type: string
          format: int64
        - name: overrides
          description: state overrides encoded as json.
          in: query
          required: false
          type: string
          format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/min_gas_price:
    get:
      summary: |-
        GlobalMinGasPrice queries the MinGasPrice
        it's similar to feemarket module's method,
        but makes the conversion to 18 decimals
        when the evm denom is represented with a different precision.
      operationId: GlobalMinGasPrice
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              min_gas_price:
                type: string
                title: min_gas_price is the feemarket's min_gas_price
            title: QueryGlobalMinGasPriceResponse returns the GlobalMinGasPrice
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/params:
    get:
      summary: Params queries the parameters of x/vm module.
      operationId: EvmParams
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              params:
                description: params define the evm module parameters.
                type: object
                properties:
                  evm_denom:
                    type: string
                    description: >-
                      evm_denom represents the token denomination used to run
                      the EVM state

                      transitions.
                  extra_eips:
                    type: array
                    items:
                      type: string
                      format: int64
                    title: extra_eips defines the additional EIPs for the vm.Config
                  evm_channels:
                    type: array
                    items:
                      type: string
                    title: >-
                      evm_channels is the list of channel identifiers from EVM
                      compatible chains
                  access_control:
                    title: access_control defines the permission policy of the EVM
                    type: object
                    properties:
                      create:
                        title: >-
                          create defines the permission policy for creating
                          contracts
                        type: object
                        properties:
                          access_type:
                            title: >-
                              access_type defines which type of permission is
                              required for the operation
                            type: string
                            enum:
                              - ACCESS_TYPE_PERMISSIONLESS
                              - ACCESS_TYPE_RESTRICTED
                              - ACCESS_TYPE_PERMISSIONED
                            default: ACCESS_TYPE_PERMISSIONLESS
                            description: >-
                              - ACCESS_TYPE_PERMISSIONLESS:
                              ACCESS_TYPE_PERMISSIONLESS does not restrict the
                              operation to anyone
                               - ACCESS_TYPE_RESTRICTED: ACCESS_TYPE_RESTRICTED restrict the operation to anyone
                               - ACCESS_TYPE_PERMISSIONED: ACCESS_TYPE_PERMISSIONED only allows the operation for specific addresses
                          access_control_list:
                            type: array
                            items:
                              type: string
                            title: >-
                              access_control_list defines defines different
                              things depending on the

                              AccessType:

                              - ACCESS_TYPE_PERMISSIONLESS: list of addresses
                              that are blocked from

                              performing the operation

                              - ACCESS_TYPE_RESTRICTED: ignored

                              - ACCESS_TYPE_PERMISSIONED: list of addresses that
                              are allowed to perform

                              the operation
                      call:
                        title: >-
                          call defines the permission policy for calling
                          contracts
                        type: object
                        properties:
                          access_type:
                            title: >-
                              access_type defines which type of permission is
                              required for the operation
                            type: string
                            enum:
                              - ACCESS_TYPE_PERMISSIONLESS
                              - ACCESS_TYPE_RESTRICTED
                              - ACCESS_TYPE_PERMISSIONED
                            default: ACCESS_TYPE_PERMISSIONLESS
                            description: >-
                              - ACCESS_TYPE_PERMISSIONLESS:
                              ACCESS_TYPE_PERMISSIONLESS does not restrict the
                              operation to anyone
                               - ACCESS_TYPE_RESTRICTED: ACCESS_TYPE_RESTRICTED restrict the operation to anyone
                               - ACCESS_TYPE_PERMISSIONED: ACCESS_TYPE_PERMISSIONED only allows the operation for specific addresses
                          access_control_list:
                            type: array
                            items:
                              type: string
                            title: >-
                              access_control_list defines defines different
                              things depending on the

                              AccessType:

                              - ACCESS_TYPE_PERMISSIONLESS: list of addresses
                              that are blocked from

                              performing the operation

                              - ACCESS_TYPE_RESTRICTED: ignored

                              - ACCESS_TYPE_PERMISSIONED: list of addresses that
                              are allowed to perform

                              the operation
                  active_static_precompiles:
                    type: array
                    items:
                      type: string
                    title: >-
                      active_static_precompiles defines the slice of hex
                      addresses of the

                      precompiled contracts that are active
                  history_serve_window:
                    type: string
                    format: uint64
                  extended_denom_options:
                    type: object
                    properties:
                      extended_denom:
                        type: string
                title: Params defines the EVM module parameters
            description: >-
              QueryParamsResponse defines the response type for querying x/vm
              parameters.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /cosmos/evm/vm/v1/storage/{address}/{key}:
    get:
      summary: Storage queries the balance of all coins for a single account.
      operationId: EvmStorage
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              value:
                type: string
                description: >-
                  value defines the storage state value hash associated with the
                  given key.
            description: >-
              QueryStorageResponse is the response type for the Query/Storage
              RPC

              method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: address
          description: address is the ethereum hex address to query the storage state for.
          in: path
          required: true
          type: string
        - name: key
          description: key defines the key of the storage state
          in: path
          required: true
          type: string
      tags:
        - Query
  /cosmos/evm/vm/v1/trace_block:
    get:
      summary: |-
        TraceBlock implements the `debug_traceBlockByNumber` and
        `debug_traceBlockByHash` rpc api
      operationId: TraceBlock
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              data:
                type: string
                format: byte
                title: data is the response serialized in bytes
            title: QueryTraceBlockResponse defines TraceBlock response
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: trace_config.tracer
          description: tracer is a custom javascript tracer.
          in: query
          required: false
          type: string
        - name: trace_config.timeout
          description: >-
            timeout overrides the default timeout of 5 seconds for
            JavaScript-based

            tracing calls.
          in: query
          required: false
          type: string
        - name: trace_config.reexec
          description: >-
            reexec defines the number of blocks the tracer is willing to go
            back.
          in: query
          required: false
          type: string
          format: uint64
        - name: trace_config.disable_stack
          description: disable_stack switches stack capture.
          in: query
          required: false
          type: boolean
        - name: trace_config.disable_storage
          description: disable_storage switches storage capture.
          in: query
          required: false
          type: boolean
        - name: trace_config.debug
          description: debug can be used to print output during capture end.
          in: query
          required: false
          type: boolean
        - name: trace_config.limit
          description: >-
            limit defines the maximum length of output, but zero means
            unlimited.
          in: query
          required: false
          type: integer
          format: int32
        - name: trace_config.overrides.homestead_block
          description: homestead_block switch (nil no fork, 0 = already homestead).
          in: query
          required: false
          type: string
