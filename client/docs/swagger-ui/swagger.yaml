                      - SOURCE_TYPE_OP_CROSS_CHAIN
                      - SOURCE_TYPE_POLYGON_CROSS_CHAIN
                      - SOURCE_TYPE_SCROLL_CROSS_CHAIN
                      - SOURCE_TYPE_LINEA_CROSS_CHAIN
                      - SOURCE_TYPE_MANTLE_CROSS_CHAIN
                      - SOURCE_TYPE_ARBITRUM_CROSS_CHAIN
                      - SOURCE_TYPE_OPTIMISM_CROSS_CHAIN
                      - SOURCE_TYPE_BASE_CROSS_CHAIN
                    default: SOURCE_TYPE_ORIGIN
                    title: >-
                      SourceType represents the source of resource creation,
                      which can

                      from Moca native or from a cross-chain transfer from BSC
                  checksums:
                    type: array
                    items:
                      type: string
                      format: byte
                    title: >-
                      checksums define the root hash of the pieces which stored
                      in a SP.

                      add omit tag to omit the field when converting to NFT
                      metadata
                  tags:
                    title: tags defines a list of tags the object has
                    type: object
                    properties:
                      tags:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            value:
                              type: string
                        title: tags defines a list of tags the resource has
                  is_updating:
                    type: boolean
                    description: is_updating indicates whether a object is being updated.
                  updated_at:
                    type: string
                    format: int64
                    description: >-
                      updated_at define the block timestamp when the object is
                      updated. Will not be visible until object is re-sealed.
                  updated_by:
                    type: string
                    description: >-
                      updated_by defined the account address of updater(if there
                      is). Will not be visible until object is re-sealed.
                  version:
                    type: string
                    format: int64
                    title: version define the version of object
              global_virtual_group:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                    description: >-
                      ID represents the unique identifier of the global virtual
                      group.
                  family_id:
                    type: integer
                    format: int64
                    description: >-
                      Family ID represents the identifier of the GVG family that
                      the group belongs to.
                  primary_sp_id:
                    type: integer
                    format: int64
                    description: >-
                      Primary SP ID represents the unique identifier of the
