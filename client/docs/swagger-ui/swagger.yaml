  cosmos.evm.vm.v1.Log:
    type: object
    properties:
      address:
        type: string
        title: address of the contract that generated the event
      topics:
        type: array
        items:
          type: string
        description: topics is a list of topics provided by the contract.
      data:
        type: string
        format: byte
        title: data which is supplied by the contract, usually ABI-encoded
      block_number:
        type: string
        format: uint64
        title: block_number of the block in which the transaction was included
      tx_hash:
        type: string
        title: tx_hash is the transaction hash
      tx_index:
        type: string
        format: uint64
        title: tx_index of the transaction in the block
      block_hash:
        type: string
        title: block_hash of the block in which the transaction was included
      index:
        type: string
        format: uint64
        title: index of the log in the block
      removed:
        type: boolean
        description: >-
          removed is true if this log was reverted due to a chain

          reorganisation. You must pay attention to this field if you receive
          logs

          through a filter query.
      block_timestamp:
        type: string
        format: uint64
        title: >-
          block_timestamp is the timestamp of the block in which the transaction
          was
    description: >-
      Log represents an protobuf compatible Ethereum Log that defines a contract

      log event. These events are generated by the LOG opcode and stored/indexed
      by

      the node.


      NOTE: address, topics and data are consensus fields. The rest of the
      fields

      are derived, i.e. filled in by the nodes, but not secured by consensus.
  cosmos.evm.vm.v1.MsgEthereumTx:
    type: object
    properties:
      from:
        type: string
        format: byte
        title: >-
          from is the bytes of ethereum signer address. This address value is
          checked

          against the address derived from the signature (V, R, S) using the

          secp256k1 elliptic curve
      raw:
        type: string
        format: byte
        title: raw is the raw ethereum transaction
    description: MsgEthereumTx encapsulates an Ethereum transaction as an SDK message.
  cosmos.evm.vm.v1.MsgEthereumTxResponse:
    type: object
    properties:
      hash:
        type: string
        title: >-
          hash of the ethereum transaction in hex format. This hash differs from
          the

          CometBFT sha256 hash of the transaction bytes. See

          https://github.com/tendermint/tendermint/issues/6539 for reference
      logs:
        type: array
        items:
          type: object
          properties:
            address:
              type: string
              title: address of the contract that generated the event
            topics:
              type: array
              items:
                type: string
              description: topics is a list of topics provided by the contract.
            data:
              type: string
              format: byte
              title: data which is supplied by the contract, usually ABI-encoded
            block_number:
