  /moca/storage/list_buckets:
    get:
      summary: Queries a list of bucket items.
      operationId: ListBuckets
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              bucket_infos:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      type: string
                      description: >-
                        owner is the account address of bucket creator, it is
                        also the bucket owner.
                    bucket_name:
                      type: string
                      title: bucket_name is a globally unique name of bucket
                    visibility:
                      description: >-
                        visibility defines the highest permissions for bucket.
                        When a bucket is public, everyone can get storage
                        objects in it.
                      type: string
                      enum:
                        - VISIBILITY_TYPE_UNSPECIFIED
                        - VISIBILITY_TYPE_PUBLIC_READ
                        - VISIBILITY_TYPE_PRIVATE
                        - VISIBILITY_TYPE_INHERIT
                      default: VISIBILITY_TYPE_UNSPECIFIED
                    id:
                      type: string
                      description: id is the unique identification for bucket.
                    source_type:
                      title: >-
                        source_type defines which chain the user should send the
                        bucket management transactions to
                      type: string
                      enum:
                        - SOURCE_TYPE_ORIGIN
                        - SOURCE_TYPE_MIRROR_PENDING
                        - SOURCE_TYPE_BSC_CROSS_CHAIN
                        - SOURCE_TYPE_OP_CROSS_CHAIN
                        - SOURCE_TYPE_POLYGON_CROSS_CHAIN
                        - SOURCE_TYPE_SCROLL_CROSS_CHAIN
                        - SOURCE_TYPE_LINEA_CROSS_CHAIN
                        - SOURCE_TYPE_MANTLE_CROSS_CHAIN
                        - SOURCE_TYPE_ARBITRUM_CROSS_CHAIN
                        - SOURCE_TYPE_OPTIMISM_CROSS_CHAIN
                        - SOURCE_TYPE_BASE_CROSS_CHAIN
                      default: SOURCE_TYPE_ORIGIN
                    create_at:
                      type: string
                      format: int64
                      description: >-
                        create_at define the block timestamp when the bucket
                        created.
                    payment_address:
                      type: string
                      title: payment_address is the address of the payment account
                    global_virtual_group_family_id:
                      type: integer
                      format: int64
                      title: >-
                        global_virtual_group_family_id defines the unique id of
                        gvg family
                    charged_read_quota:
                      type: string
                      format: uint64
                      description: >-
                        charged_read_quota defines the traffic quota for read in
                        bytes per month.

                        The available read data for each user is the sum of the
                        free read data provided by SP and

                        the ChargeReadQuota specified here.
                    bucket_status:
                      description: bucket_status define the status of the bucket.
                      type: string
                      enum:
                        - BUCKET_STATUS_CREATED
                        - BUCKET_STATUS_DISCONTINUED
                        - BUCKET_STATUS_MIGRATING
                      default: BUCKET_STATUS_CREATED
                    tags:
                      title: tags defines a list of tags the bucket has
                      type: object
                      properties:
                        tags:
                          type: array
                          items:
                            type: object
                            properties:
                              key:
                                type: string
                              value:
                                type: string
                          title: tags defines a list of tags the resource has
                    sp_as_delegated_agent_disabled:
                      type: boolean
                      title: >-
                        sp_as_delegated_agent_disabled indicates that whether
                        bucket owner disable SP as the upload agent.

                        when a bucket is created, by default, this is false,
                        means SP is allowed to create object for delegator
              pagination:
                type: object
                properties:
                  next_key:
                    type: string
                    format: byte
                    description: |-
                      next_key is the key to be passed to PageRequest.key to
                      query the next page most efficiently. It will be empty if
                      there are no more results.
                  total:
                    type: string
                    format: uint64
                    title: >-
                      total is total number of results available if
                      PageRequest.count_total

                      was set, its value is undefined otherwise
                description: >-
                  PageResponse is to be embedded in gRPC response messages where
                  the

                  corresponding request message has used PageRequest.

                   message SomeResponse {
                           repeated Bar results = 1;
                           PageResponse page = 2;
                   }
