  /moca/storage/policy_by_id/{policy_id}:
    get:
      summary: Queries a policy by policy id
      operationId: QueryPolicyById
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              policy:
                type: object
                properties:
                  id:
                    type: string
                    title: >-
                      id is an unique u256 sequence for each policy. It also be
                      used as NFT tokenID
                  principal:
                    title: >-
                      principal defines the accounts/group which the permission
                      grants to
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - PRINCIPAL_TYPE_UNSPECIFIED
                          - PRINCIPAL_TYPE_GNFD_ACCOUNT
                          - PRINCIPAL_TYPE_GNFD_GROUP
                        default: PRINCIPAL_TYPE_UNSPECIFIED
                        description: >-
                          PrincipalType refers to the identity type of system
                          users or entities.

                          In Moca, it usually refers to accounts or groups.
                      value:
                        type: string
                        title: >-
                          When the type is an account, its value is
                          sdk.AccAddress().String();

                          when the type is a group, its value is
                          math.Uint().String()
                    description: >-
                      Principal define the roles that can be grant permissions
                      to. Currently, it can be account or group.
                  resource_type:
                    title: >-
                      resource_type defines the type of resource that grants
                      permission for
                    type: string
                    enum:
                      - RESOURCE_TYPE_UNSPECIFIED
                      - RESOURCE_TYPE_BUCKET
                      - RESOURCE_TYPE_OBJECT
                      - RESOURCE_TYPE_GROUP
                    default: RESOURCE_TYPE_UNSPECIFIED
                  resource_id:
                    type: string
                    title: >-
                      resource_id defines the bucket/object/group id of the
                      resource that grants permission for
                  statements:
                    type: array
                    items:
                      type: object
                      properties:
                        effect:
                          title: >-
                            effect define the impact of permissions, which can
                            be Allow/Deny
                          type: string
                          enum:
                            - EFFECT_UNSPECIFIED
                            - EFFECT_ALLOW
                            - EFFECT_DENY
                          default: EFFECT_UNSPECIFIED
                        actions:
                          type: array
                          items:
                            type: string
                            enum:
                              - ACTION_UNSPECIFIED
                              - ACTION_UPDATE_BUCKET_INFO
                              - ACTION_DELETE_BUCKET
                              - ACTION_CREATE_OBJECT
                              - ACTION_DELETE_OBJECT
                              - ACTION_COPY_OBJECT
                              - ACTION_GET_OBJECT
                              - ACTION_EXECUTE_OBJECT
                              - ACTION_LIST_OBJECT
                              - ACTION_UPDATE_GROUP_MEMBER
                              - ACTION_DELETE_GROUP
                              - ACTION_UPDATE_OBJECT_INFO
                              - ACTION_UPDATE_GROUP_EXTRA
                              - ACTION_UPDATE_GROUP_INFO
                              - ACTION_UPDATE_OBJECT_CONTENT
                              - ACTION_TYPE_ALL
                            default: ACTION_UNSPECIFIED
                            title: >-
                              ActionType defines the operations you can execute
                              in moca storage network
                          description: >-
                            action_type define the operation type you can act.
                            moca defines a set of permission

                            that you can specify in a permissionInfo. see
                            ActionType enum for detail.
                        resources:
                          type: array
                          items:
                            type: string
                          description: >-
                            CAN ONLY USED IN bucket level. Support fuzzy match
                            and limit to 5.

                            The sub-resource name must comply with the standard
                            specified in the moca/types/grn.go file for Moca
                            resource names.

                            If the sub-resources include 'grn:o:{bucket_name}/*'
                            in the statement, it indicates that specific
                            permissions is granted to all objects within the
                            specified bucket.

                            If the sub-resources include
                            'grn:o:{bucket_name}/test_*' in the statement, it
                            indicates that specific permissions is granted to
                            all objects with the `test_` prefix within the
                            specified bucket.

                            If the sub-resources is empty, when you need to
                            operate(excluding CreateObject) a specified
                            subresource, it will be denied because it cannot
                            match any subresource.
                        expiration_time:
                          type: string
                          format: date-time
                          description: >-
                            expiration_time defines how long the permission is
                            valid. If not explicitly specified, it means it will
                            not expire.
                        limit_size:
                          description: >-
                            limit_size defines the total data size that is
                            allowed to operate. If not explicitly specified, it
                            means it will not limit.
                          type: object
                          properties:
                            value:
                              type: string
                              format: uint64
                              description: The uint64 value.
                    title: >-
                      statements defines the details content of the permission,
                      including effect/actions/sub-resources
                  expiration_time:
                    type: string
                    format: date-time
                    title: >-
                      expiration_time defines the whole expiration time of all
                      the statements.

                      Notices: Its priority is higher than the expiration time
                      inside the Statement
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: policy_id
          in: path
          required: true
          type: string
      tags:
        - Query
