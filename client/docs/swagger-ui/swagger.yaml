  moca.storage.QueryPolicyByIdResponse:
    type: object
    properties:
      policy:
        type: object
        properties:
          id:
            type: string
            title: >-
              id is an unique u256 sequence for each policy. It also be used as
              NFT tokenID
          principal:
            title: >-
              principal defines the accounts/group which the permission grants
              to
            type: object
            properties:
              type:
                type: string
                enum:
                  - PRINCIPAL_TYPE_UNSPECIFIED
                  - PRINCIPAL_TYPE_GNFD_ACCOUNT
                  - PRINCIPAL_TYPE_GNFD_GROUP
                default: PRINCIPAL_TYPE_UNSPECIFIED
                description: >-
                  PrincipalType refers to the identity type of system users or
                  entities.

                  In Moca, it usually refers to accounts or groups.
              value:
                type: string
                title: >-
                  When the type is an account, its value is
                  sdk.AccAddress().String();

                  when the type is a group, its value is math.Uint().String()
            description: >-
              Principal define the roles that can be grant permissions to.
              Currently, it can be account or group.
          resource_type:
            title: >-
              resource_type defines the type of resource that grants permission
              for
