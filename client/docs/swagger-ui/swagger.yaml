                          VerifyVoteExtension and given

                          to the application to use when proposing a block
                          during PrepareProposal.
                    description: >-
                      ABCIParams configure functionality specific to the
                      Application Blockchain Interface.
                  authority:
                    type: object
                    properties:
                      authority:
                        type: string
              app_hash:
                type: string
                format: byte
                description: app_hash is the app hash after processing this block.
            description: >-
