                              properties:
                                key:
                                  type: string
                                value:
                                  type: string
                                index:
                                  type: boolean
                              description: >-
                                EventAttribute is a single key-value pair,
                                associated with an event.
                        description: >-
                          Event allows application developers to attach
                          additional information to

                          ResponseFinalizeBlock and ResponseCheckTx.

                          Later, transactions may be queried using these events.
                    codespace:
                      type: string
                  description: >-
                    ExecTxResult contains results of executing one individual
                    transaction.


                    * Its structure is equivalent to #ResponseDeliverTx which
                    will be deprecated/deleted
                description: >-
                  txs_results contains the results of each transaction
                  execution.
              finalize_block_events:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          value:
                            type: string
                          index:
                            type: boolean
                        description: >-
                          EventAttribute is a single key-value pair, associated
                          with an event.
                  description: >-
                    Event allows application developers to attach additional
                    information to

                    ResponseFinalizeBlock and ResponseCheckTx.

                    Later, transactions may be queried using these events.
                description: >-
