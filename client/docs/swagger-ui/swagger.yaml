                    properties:
                      key:
                        type: string
                      value:
                        type: string
                  title: tags defines a list of tags the resource has
            is_updating:
              type: boolean
              description: is_updating indicates whether a object is being updated.
            updated_at:
              type: string
              format: int64
              description: >-
                updated_at define the block timestamp when the object is
                updated. Will not be visible until object is re-sealed.
            updated_by:
              type: string
              description: >-
                updated_by defined the account address of updater(if there is).
                Will not be visible until object is re-sealed.
