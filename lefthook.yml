pre-commit:
  parallel: false
  commands:
    go-format:
      glob: "*.go"
      run: env GOTOOLCHAIN=go1.25.10 go run mvdan.cc/gofumpt@v0.7.0 -w {staged_files} && git add {staged_files}
    js-shell-format:
      glob: "*.{js,sh}"
      run: npm exec --yes --package lint-staged@^15.2.7 --package prettier@^3.6.2 -- lint-staged

pre-push:
  parallel: false
  commands:
    go-lint:
      run: env GOTOOLCHAIN=go1.25.10 go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --new-from-rev=HEAD~1

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: npx --yes --package @commitlint/cli@^19.2.2 commitlint --edit {1}
