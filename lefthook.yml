pre-commit:
  parallel: false
  commands:
    go-format:
      glob: "*.go"
      run: make format
    js-shell-format:
      glob: "*.{js,sh}"
      run: npx lint-staged

pre-push:
  parallel: false
  commands:
    go-lint:
      run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0 run --new-from-rev=HEAD~1

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
